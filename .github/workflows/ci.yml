name: CI

on:
  push:
    branches: ["**"]
  pull_request:

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version-file: ".nvmrc"
          cache: "npm"
      - run: npm install
      - run: npm run lint
      - run: npm test
      - run: npm run build
        env:
          # Build-time placeholders so next build doesn't fail on missing config.
          APP_PASSWORD: ci-placeholder
